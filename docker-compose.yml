services:
  florasense-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: florasense:latest
    container_name: florasense-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - path: .env
        required: false
    environment:
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
